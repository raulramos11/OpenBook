spring.application.name=OpenBook
openbook.google-books.api-key=${GOOGLE_BOOKS_API_KEY:}
server.port=${PORT:8080}

openbook.ratings.database-url=${JDBC_DATABASE_URL:${DATABASE_URL:}}
openbook.ratings.database-username=${JDBC_DATABASE_USERNAME:}
openbook.ratings.database-password=${JDBC_DATABASE_PASSWORD:}
openbook.ratings.require-database=${RATINGS_REQUIRE_DATABASE:${RENDER:false}}

openbook.selenium-source.enabled=false
openbook.selenium-source.url=https://www.gutenberg.org/ebooks/search/?query={term}
openbook.selenium-source.name=Fonte Selenium
openbook.selenium-source.result-selector=a[href]
openbook.selenium-source.title-selector=
openbook.selenium-source.cover-selector=img
openbook.selenium-source.browser-binary=
openbook.selenium-source.driver-path=C:/msedgedriver.exe
